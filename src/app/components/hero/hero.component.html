<section class="max-w-[1200px] mx-auto px-margin pt-24 lg:pt-[120px] pb-16 lg:pb-24 flex flex-col items-center text-center overflow-hidden">
  <div class="max-w-4xl mb-12 lg:mb-16 animate-on-scroll is-visible px-4 sm:px-0">
    <div class="inline-flex items-center gap-2 px-4 py-1.5 rounded-full bg-primary/5 border border-primary/20 mb-6 lg:mb-8 backdrop-blur-sm shadow-sm transition-all hover:bg-primary/10">
      <span class="w-2 h-2 rounded-full bg-primary animate-pulse"></span>
      <span class="font-label-md text-primary font-medium tracking-wide text-xs sm:text-sm">Plataforma de Soporte Inteligente</span>
    </div>
    <h1 class="font-headline-xl text-[36px] sm:text-[48px] md:text-[64px] lg:text-[72px] leading-[1.1] md:leading-[1.05] tracking-tight text-on-surface mb-6 font-extrabold">
      La IA que organiza tu <span class="text-transparent bg-clip-text bg-gradient-to-r from-primary to-orange-400">soporte interno</span> al instante
    </h1>
    <p class="font-body-lg text-[16px] md:text-[20px] text-secondary mb-8 lg:mb-10 max-w-2xl mx-auto leading-relaxed">
      Reduce tiempos de resolución, automatiza el triaje de tickets y mejora la eficiencia de todos tus departamentos en un solo lugar.
    </p>
    <div class="flex flex-col sm:flex-row justify-center gap-4 w-full sm:w-auto px-4 sm:px-0">
      <button class="w-full sm:w-auto bg-primary text-white font-label-md text-[16px] px-8 py-3.5 rounded-full hover:bg-primary/90 hover:shadow-[0_8px_20px_rgba(249,115,22,0.3)] transition-all transform hover:-translate-y-1 active:scale-95 duration-200 font-bold border border-primary/50">
        Empieza Gratis
      </button>
      <button class="w-full sm:w-auto bg-white/50 backdrop-blur-md border border-outline-variant/50 text-on-surface font-label-md text-[16px] px-8 py-3.5 rounded-full hover:bg-white hover:shadow-lg transition-all transform hover:-translate-y-1 active:scale-95 duration-200 font-bold">
        Ver Demo Interactiva
      </button>
    </div>
  </div>

  <!-- Animated Desktop Layout -->
  <div class="w-full max-w-5xl mx-auto mt-8 lg:mt-16 relative h-[250px] sm:h-[350px] md:h-[500px] animate-on-scroll is-visible"
    style="perspective: 1200px;">

    <!-- Glow behind -->
    <div class="absolute inset-0 bg-primary/20 blur-[60px] md:blur-[100px] rounded-full top-10 pointer-events-none"></div>

    <div
      class="w-full h-full bg-surface-container-lowest border border-surface-variant rounded-xl md:rounded-2xl shadow-[0_20px_50px_rgba(0,0,0,0.1)] overflow-hidden flex flex-col transition-all duration-1000 ease-out [transform:rotateX(15deg)_rotateY(0deg)_scale(0.95)] sm:[transform:rotateX(10deg)_rotateY(-5deg)_scale(0.95)] hover:[transform:rotateX(0deg)_rotateY(0deg)_scale(1)] group relative z-10 cursor-pointer">

      <!-- Window Header -->
      <div
        class="h-8 md:h-12 border-b border-surface-variant flex items-center px-3 md:px-4 gap-2 bg-surface-container-lowest/50 backdrop-blur">
        <div class="flex gap-1.5">
          <div class="w-2 h-2 md:w-3 md:h-3 rounded-full bg-[#ff5f56]"></div>
          <div class="w-2 h-2 md:w-3 md:h-3 rounded-full bg-[#ffbd2e]"></div>
          <div class="w-2 h-2 md:w-3 md:h-3 rounded-full bg-[#27c93f]"></div>
        </div>
        <div class="ml-2 md:ml-4 flex-1 max-w-[120px] md:max-w-sm h-4 md:h-6 bg-surface-container rounded-md flex items-center px-2 md:px-3">
          <div class="w-2 h-2 md:w-4 md:h-4 rounded-full bg-surface-variant"></div>
          <div class="w-16 md:w-32 h-1 md:h-2 bg-surface-variant rounded ml-2"></div>
        </div>
      </div>

      <!-- App Body -->
      <div class="flex flex-1 overflow-hidden bg-background p-3 md:p-6 gap-3 md:gap-6 relative">
        <!-- Sidebar -->
        <div class="w-32 md:w-48 h-full flex-col gap-3 md:gap-4 hidden sm:flex border-r border-surface-variant pr-3 md:pr-4">
          <div class="w-full h-6 md:h-8 bg-primary/10 rounded flex items-center px-2 gap-2">
            <div class="w-3 h-3 md:w-4 md:h-4 bg-primary rounded"></div>
            <div class="w-12 md:w-20 h-1 md:h-2 bg-primary/50 rounded"></div>
          </div>
          <div class="w-full h-6 md:h-8 hover:bg-surface-container rounded flex items-center px-2 gap-2 transition-colors">
            <div class="w-3 h-3 md:w-4 md:h-4 bg-surface-variant rounded"></div>
            <div class="w-16 md:w-24 h-1 md:h-2 bg-surface-variant rounded"></div>
          </div>
          <div class="w-full h-6 md:h-8 hover:bg-surface-container rounded flex items-center px-2 gap-2 transition-colors">
            <div class="w-3 h-3 md:w-4 md:h-4 bg-surface-variant rounded"></div>
            <div class="w-10 md:w-16 h-1 md:h-2 bg-surface-variant rounded"></div>
          </div>
        </div>

        <!-- Main Content -->
        <div class="flex-1 flex flex-col gap-3 md:gap-6">
          <div class="w-1/2 md:w-1/3 h-4 md:h-6 bg-surface-variant rounded"></div>

          <!-- Floating Tickets -->
          <div class="flex flex-row gap-2 md:gap-4">
            <!-- Ticket 1 -->
            <div
              class="flex-1 h-20 md:h-32 bg-white border border-surface-variant rounded-lg md:rounded-xl p-2 md:p-4 shadow-sm relative overflow-hidden transition-all duration-500 group-hover:-translate-y-2">
              <div class="flex justify-between items-center mb-2 md:mb-4">
                <div class="w-1/2 h-2 md:h-4 bg-primary/20 rounded"></div>
                <div class="w-4 md:w-8 h-2 md:h-4 bg-[#ff5f56]/20 rounded-full"></div>
              </div>
              <div class="w-3/4 h-1 md:h-2 bg-surface-variant rounded mb-1 md:mb-2"></div>
              <div class="w-1/2 h-1 md:h-2 bg-surface-variant rounded"></div>

              <!-- AI Badge appearing -->
              <div
                class="hidden md:block absolute bottom-4 right-4 bg-primary/10 px-2 py-1 rounded text-[10px] text-primary font-bold opacity-0 group-hover:opacity-100 transition-opacity duration-700 delay-300">
                AI Sorted
              </div>
            </div>

            <!-- Ticket 2 -->
            <div
              class="flex-1 h-20 md:h-32 bg-white border border-surface-variant rounded-lg md:rounded-xl p-2 md:p-4 shadow-sm relative overflow-hidden transition-all duration-500 group-hover:-translate-y-4 delay-100">
              <div class="flex justify-between items-center mb-2 md:mb-4">
                <div class="w-1/3 h-2 md:h-4 bg-primary/20 rounded"></div>
                <div class="w-4 md:w-8 h-2 md:h-4 bg-[#27c93f]/20 rounded-full"></div>
              </div>
              <div class="w-full h-1 md:h-2 bg-surface-variant rounded mb-1 md:mb-2"></div>
              <div class="w-2/3 h-1 md:h-2 bg-surface-variant rounded"></div>

              <!-- AI Badge appearing -->
              <div
                class="hidden md:block absolute bottom-4 right-4 bg-primary/10 px-2 py-1 rounded text-[10px] text-primary font-bold opacity-0 group-hover:opacity-100 transition-opacity duration-700 delay-500">
                AI Sorted
              </div>
            </div>
          </div>

          <!-- Graph Area -->
          <div
            class="w-full flex-1 bg-white border border-surface-variant rounded-lg md:rounded-xl p-3 md:p-6 shadow-sm flex flex-col gap-2 md:gap-4">
            <div class="w-1/3 md:w-1/4 h-2 md:h-4 bg-surface-variant rounded"></div>
            <div class="flex-1 flex items-end gap-2 md:gap-4 px-2 md:px-4 border-b border-l border-surface-variant pb-1">
              <!-- Bars with staggered animation based on group hover -->
              <div class="flex-1 bg-primary/30 rounded-t transition-all duration-1000 ease-out h-0 group-hover:h-[30%]">
              </div>
              <div
                class="flex-1 bg-primary/50 rounded-t transition-all duration-1000 ease-out delay-100 h-0 group-hover:h-[50%]">
              </div>
              <div
                class="flex-1 bg-primary/70 rounded-t transition-all duration-1000 ease-out delay-200 h-0 group-hover:h-[80%]">
              </div>
              <div
                class="flex-1 bg-primary rounded-t transition-all duration-1000 ease-out delay-300 h-0 group-hover:h-[100%]">
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
