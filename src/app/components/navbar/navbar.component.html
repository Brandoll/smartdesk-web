<div class="fixed top-4 left-0 w-full z-50 px-4 md:px-8 pointer-events-none flex justify-center">
  <nav class="bg-surface/80 backdrop-blur-xl border border-surface-variant/50 text-primary font-body-md text-body-md w-full max-w-[1200px] rounded-[100px] shadow-[0_8px_32px_rgba(0,0,0,0.08)] pointer-events-auto transition-all duration-300 relative">
    <div class="flex justify-between items-center px-6 md:px-8 py-2.5">
      <div class="flex items-center gap-sm">
        <img alt="SmartDesk Logo" class="h-10 w-10 object-contain" src="/SmartDesk_small.png"/>
        <span class="font-headline-md text-headline-md font-bold text-on-surface hidden sm:block">SmartDesk</span>
      </div>
      
      <div class="hidden md:flex gap-gutter">
        <a href="#features" class="text-secondary hover:text-primary transition-colors cursor-pointer font-medium">Funcionalidades</a>
        <a href="#benefits" class="text-secondary hover:text-primary transition-colors cursor-pointer font-medium">Beneficios</a>
        <a href="#pricing" class="text-secondary hover:text-primary transition-colors cursor-pointer font-medium">Precios</a>
        <a href="#faq" class="text-secondary hover:text-primary transition-colors cursor-pointer font-medium">FAQ</a>
      </div>

      <div class="hidden md:flex gap-sm items-center">
        <a class="font-label-md text-label-md text-secondary hover:text-primary transition-colors px-sm py-base cursor-pointer">Iniciar sesión</a>
        <a class="bg-primary text-white font-label-md text-label-md px-6 py-2.5 rounded-full hover:bg-primary/90 transition-colors shadow-sm cursor-pointer active:scale-95 duration-200">Crear cuenta</a>
      </div>

      <button class="md:hidden text-on-surface p-2 hover:bg-surface-variant/50 rounded-full transition-colors" (click)="toggleMenu()">
         @if (isMobileMenuOpen) {
           <svg lucideX class="w-6 h-6"></svg>
         } @else {
           <svg lucideMenu class="w-6 h-6"></svg>
         }
      </button>
    </div>

    @if (isMobileMenuOpen) {
    <div class="md:hidden absolute top-[calc(100%+12px)] left-0 w-full bg-surface/95 backdrop-blur-2xl border border-surface-variant/50 rounded-3xl shadow-[0_20px_60px_rgba(0,0,0,0.15)] py-6 px-margin flex flex-col gap-4 overflow-hidden z-50">
      <a href="#features" class="text-on-surface font-medium hover:text-primary transition-colors py-2 cursor-pointer text-lg" (click)="toggleMenu()">Funcionalidades</a>
      <a href="#benefits" class="text-on-surface font-medium hover:text-primary transition-colors py-2 cursor-pointer text-lg" (click)="toggleMenu()">Beneficios</a>
      <a href="#pricing" class="text-on-surface font-medium hover:text-primary transition-colors py-2 cursor-pointer text-lg" (click)="toggleMenu()">Precios</a>
      <a href="#faq" class="text-on-surface font-medium hover:text-primary transition-colors py-2 cursor-pointer text-lg" (click)="toggleMenu()">FAQ</a>
      <hr class="border-surface-variant/50 my-2">
      <a class="text-secondary hover:text-primary transition-colors py-2 cursor-pointer text-center font-label-md text-lg">Iniciar sesión</a>
      <a class="bg-primary text-white font-bold font-label-md text-lg px-6 py-3.5 rounded-full hover:bg-primary/90 transition-colors text-center shadow-sm cursor-pointer mt-2 active:scale-95">Crear cuenta</a>
    </div>
    }
  </nav>
</div>
